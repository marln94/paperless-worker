services:
  paperless-worker:
    build: .
    container_name: paperless-worker
    restart: unless-stopped
    environment:
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      PAPERLESS_API_URL: ${PAPERLESS_API_URL}
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
      ORACLE_API_URL: ${ORACLE_API_URL}
      ORACLE_API_KEY: ${ORACLE_API_KEY}
      B2_ENDPOINT: ${B2_ENDPOINT}
      B2_REGION: ${B2_REGION}
      B2_ACCESS_KEY_ID: ${B2_ACCESS_KEY_ID}
      B2_SECRET_ACCESS_KEY: ${B2_SECRET_ACCESS_KEY}
      B2_BUCKET: ${B2_BUCKET}
      B2_PUBLIC_URL: ${B2_PUBLIC_URL}
    networks:
      - paperless_network

networks:
  paperless_network:
    external: true
    name: paperless_paperless_network